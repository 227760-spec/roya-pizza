<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pizza House</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <nav class="navbar">
        <div class="logo">Pizza House</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#products">Pizzas</a></li>
            <li><a href="#footer">Contact</a></li>
        </ul>
    </nav>

    <section class="hero" id="home">
        <div class="hero-content">
            <h1>Fresh & Delicious Pizza</h1>
            <p>Enjoy our AI-powered pizza menu with fresh recipes loaded dynamically from an API.</p>
            <a href="#products" class="btn">View Menu</a>
        </div>
    </section>

    <section class="products" id="products">
        <h2>Our Pizza Menu</h2>
        <div class="pizza-container" id="pizzaContainer">
            <!-- Pizza cards will appear here using JavaScript -->
        </div>
    </section>

    <footer id="footer">
        <p>Created by: Your Name</p>
        <p>&copy; 2026 Pizza House. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>s
